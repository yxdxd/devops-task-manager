name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3


      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin


      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task-manager-backend ./backend


      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/task-manager-frontend ./frontend


      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/task-manager-backend


      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/task-manager-frontend
